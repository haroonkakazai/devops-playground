name: CI - Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

env:
  APP_PATH: ./kubernetes/nginx-static-site

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests with coverage
        working-directory: ${{ env.APP_PATH }}
        run: |
          pip install pytest pytest-cov
          pytest --cov=. --cov-report=term | tee coverage.txt

      - name: Comment coverage on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('${{ env.APP_PATH }}/coverage.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Test Coverage Report\n\`\`\`\n${coverage}\n\`\`\``
            });

      - name: Run Hadolint Dockerfile scan
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ env.APP_PATH }}/Dockerfile

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ env.APP_PATH }}
          severity: HIGH,CRITICAL
          exit-code: 1