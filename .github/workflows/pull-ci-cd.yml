name: Push CI CD Pipeline

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: my-app
  APP_PATH: ./kubernetes/nginx-static-site

jobs:
  ci-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Hadolint Dockerfile scan
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ env.APP_PATH }}/Dockerfile

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ env.APP_PATH }}
          severity: HIGH,CRITICAL
          exit-code: 1

  cd-docker:
    runs-on: ubuntu-latest
    needs: ci-security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME $APP_PATH

      - name: Run Docker container
        run: docker run -d --name my-site -p 8080:80 $IMAGE_NAME

      - name: Wait for container
        run: sleep 5

      - name: Get response from Docker image
        run: curl -f http://localhost:8080

      - name: Show running containers
        run: docker ps