name: CD - PR Closed

on:
  pull_request:
    types:
      - closed

env:
  IMAGE_NAME: my-static-site
  APP_PATH: ./kubernetes/nginx-static-site

jobs:
  pr-closed-info:
    runs-on: ubuntu-latest

    steps:
      - name: Show PR closed status
        run: |
          echo "PR closed"
          echo "Merged status: ${{ github.event.pull_request.merged }}"

  deploy-if-merged:
    runs-on: ubuntu-latest
    needs: pr-closed-info
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME $APP_PATH

      - name: Run Docker container
        run: docker run -d --name my-site -p 8080:80 $IMAGE_NAME

      - name: Wait for container
        run: sleep 5

      - name: Get response from container
        run: curl -f http://localhost:8080

  skip-if-not-merged:
    runs-on: ubuntu-latest
    needs: pr-closed-info
    if: github.event.pull_request.merged == false

    steps:
      - name: Skip deployment
        run: echo "PR closed without merge. Deployment skipped."