name: Deploy Docker Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

  jobs:
    deploy-job:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository 
          uses: actions/checkout@v2

        - name: show current directory and files
          run: pwd && ls -la

        - name: Build Docker Image  
          run: docker build -t my-app ./kubernetes/nginx-static-site

        - name: Run Docker Container
          run: docker run -d --name my-site -p 8080:80 my-app
    
        