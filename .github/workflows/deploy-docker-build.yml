name: Deploy Docker Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show current directory and files
        run: |
          pwd
          ls -la

      - name: Build Docker Image
        run: docker build -t my-app ./kubernetes/nginx-static-site

      - name: Show Docker Images
        run: docker images

  deploy-job:
    runs-on: ubuntu-latest
    needs: build-job

    steps:
      - name: Simulate Deploy
        run: echo "Deploying Docker image..."